# Styxpress public site example for Nginx.
#
# Replace example.com and /var/lib/styxpress/site/public before use.
# The root is the generated public directory, not the whole site directory.

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    root /var/lib/styxpress/site/public;
    index index.html;
    autoindex off;
    server_tokens off;

    # Reject symlinks so a public path cannot escape the public directory.
    disable_symlinks on from=$document_root;

    # Hidden files and dot-directories are never public.
    location ~ (^|/)\. {
        return 404;
    }

    # Homepage and top-level generated XML files.
    location = / {
        try_files /index.html =404;
    }

    location = /feed.xml {
        try_files /feed.xml =404;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    # Canonical post pages: /posts/{slug}
    location ~ ^/posts/([a-z0-9][a-z0-9-]*)/?$ {
        try_files /posts/$1/index.html =404;
    }

    # Public post cover images copied by the renderer.
    location ~ ^/posts/[a-z0-9][a-z0-9-]*/cover\.(jpg|jpeg|png|webp|avif)$ {
        try_files $uri =404;
    }

    # Public post-local assets copied by the renderer.
    location ~ ^/posts/[a-z0-9][a-z0-9-]*/assets/.+$ {
        try_files $uri =404;
    }

    # No generic static fallback. Unknown paths stay private by default.
    location / {
        return 404;
    }
}
